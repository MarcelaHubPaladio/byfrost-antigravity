# Supabase local/dev config
#
# IMPORTANT:
# - public-proposal is a PUBLIC endpoint (no login); it must NOT require JWT verification.
# - party-upload-logo performs manual auth (Authorization Bearer access_token + membership check);
#   keeping verify_jwt=false avoids the gateway rejecting tokens before our checks.
#
# If you deploy via Supabase Dashboard, ensure "Verify JWT" is turned OFF for these functions.

[functions.public-proposal]
verify_jwt = false

[functions.party-upload-logo]
verify_jwt = false

[functions.webhooks-zapi-inbound]
verify_jwt = false

[functions.whatsapp-inbound-ingest]
verify_jwt = false

[functions.autentique-goal-rules]
enabled = true
verify_jwt = true
import_map = "./functions/autentique-goal-rules/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/autentique-goal-rules/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/autentique-goal-rules/*.html" ]
